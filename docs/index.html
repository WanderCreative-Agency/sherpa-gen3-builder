<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Build Your Sherpa Gen 3 | BRS Offroad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --carbon: #0E0F0C;
  --charcoal: #1F211C;
  --graphite: #34362F;
  --cream: #F3EEE2;
  --dust: #C8B99A;
  --sandstone: #A9895D;
  --earth-green: #5F6B4F;
  --sage: #8B9478;
  --amber: #D6B56D;
  --fd: 'Bebas Neue', 'Oswald', sans-serif;
  --fc: 'Barlow Condensed', 'Oswald', sans-serif;
  --fb: 'Inter', 'Avenir Next', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--carbon);color:var(--cream);font-family:var(--fb);min-height:100vh;overflow-x:hidden}
::selection{background:var(--sandstone);color:var(--carbon)}
::placeholder{color:#6f7166}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:var(--carbon)}
::-webkit-scrollbar-thumb{background:var(--graphite);border-radius:6px}
input,textarea,select{font-family:var(--fb)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .35s ease both}

/* Topo overlay */
#topo{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:url('assets/topo-cream.png') center/1200px repeat;opacity:.09}

/* Header */
header{position:sticky;top:0;z-index:60;display:flex;align-items:center;
  justify-content:space-between;gap:20px;padding:16px 32px;
  background:rgba(14,15,12,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--charcoal)}
.hd-left{display:flex;align-items:center;gap:18px;flex-shrink:0}
.hd-logo{height:22px;width:auto;display:block}
.hd-div{width:1px;height:26px;background:var(--graphite)}
.hd-tag{font-family:var(--fc);text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--sandstone)}
#hd-price{display:none;text-align:right;line-height:1}
.hd-plabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--dust);margin-bottom:3px}
.hd-pval{font-family:var(--fd);font-size:30px;letter-spacing:.02em;color:var(--cream)}

/* Progress */
#prog{display:none;position:relative;z-index:5;align-items:center;gap:8px;
  overflow-x:auto;padding:14px 32px;border-bottom:1px solid var(--charcoal);
  background:var(--carbon);scrollbar-width:none}
#prog::-webkit-scrollbar{display:none}
.pi{display:flex;align-items:center;gap:9px;cursor:pointer;flex-shrink:0;padding-right:4px}
.pd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-family:var(--fc);font-size:13px;flex-shrink:0;transition:all .15s;
  background:transparent;color:#6f7166;border:1px solid var(--graphite)}
.pd.on{background:var(--sandstone);color:var(--carbon);border-color:var(--sandstone)}
.pd.done{color:var(--dust);border-color:var(--earth-green)}
.pl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:#6f7166}
.pl.on{color:var(--cream)}.pl.done{color:var(--dust)}
.ps{width:26px;height:1px;background:var(--graphite);margin:0 2px}

/* Config layout */
#config{position:relative;z-index:5;max-width:1320px;margin:0 auto;
  padding:36px 32px 96px;display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start}

/* Rail */
#rail{position:sticky;top:104px;flex:1 1 460px;min-width:340px;
  display:flex;flex-direction:column;gap:18px;order:0}

.prev-box{position:relative;border-radius:16px;overflow:hidden;
  border:1px solid var(--graphite);
  background:radial-gradient(120% 90% at 50% 16%,#2a2c26 0%,#131409 74%);
  aspect-ratio:16/11}
.prev-wash{position:absolute;inset:0;transition:background .4s}
.prev-img{position:absolute;inset:0;z-index:2;background:center/cover no-repeat;transition:background-image .25s}
.prev-ph{position:relative;z-index:2;width:86%;max-width:535px;aspect-ratio:535/282;
  border-radius:12px;border:1px dashed #4a4c43;margin:auto;
  background:repeating-linear-gradient(45deg,rgba(255,255,255,.04) 0 11px,transparent 11px 22px);
  display:flex;align-items:center;justify-content:center}
.prev-ph span{font-family:ui-monospace,monospace;font-size:11px;color:#9a9c8f}

/* Glance */
.glance{display:flex;gap:12px}
.gc{flex:1;display:flex;align-items:center;gap:11px;background:var(--charcoal);
  border:1px solid var(--graphite);border-radius:10px;padding:12px 14px}
.gsw{width:30px;height:30px;border-radius:7px;border:1px solid #4a4c43;flex-shrink:0}
.gsl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--sage)}
.gv{font-family:var(--fc);font-size:16px;color:var(--cream)}

/* Pricing card */
.pc{background:var(--charcoal);border:1px solid var(--graphite);border-radius:12px;overflow:hidden}
.pc-top{padding:16px 18px;border-bottom:1px solid var(--graphite)}
.pc-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.pc-row:last-child{margin-bottom:0}
.pclabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.1em;font-size:13px;color:var(--dust)}
.pcval{font-family:var(--fc);font-size:18px;color:var(--cream)}
.pc-addons{padding:12px 18px;border-bottom:1px solid var(--graphite);display:flex;flex-direction:column;gap:9px}
.pc-arow{display:flex;justify-content:space-between;gap:12px}
.pc-alabel{font-size:13px;color:var(--dust);line-height:1.3}
.pc-aval{font-family:var(--fc);font-size:14px;color:var(--cream);white-space:nowrap}
.pc-total{padding:16px 18px;background:#16170F;display:flex;justify-content:space-between;align-items:baseline}
.pc-tlabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.1em;font-size:14px;color:var(--cream)}
.pc-tval{font-family:var(--fd);font-size:30px;color:var(--sandstone)}
.pc-disc{font-size:11px;line-height:1.5;color:#6f7166}

/* Step col */
#stepcol{flex:1 1 420px;min-width:320px;display:flex;flex-direction:column;gap:22px;order:0}

/* Step headers */
.seyebrow{font-family:var(--fc);text-transform:uppercase;letter-spacing:.18em;font-size:13px;color:var(--sandstone);margin-bottom:8px}
.stitle{font-family:var(--fd);font-size:46px;letter-spacing:.03em;line-height:.95;margin:0 0 6px}
.sdesc{font-size:15px;color:var(--dust);margin:0 0 22px}

/* Option cards (grid) */
.ocard{position:relative;background:var(--charcoal);border:1px solid var(--graphite);
  border-radius:12px;padding:16px;cursor:pointer}
.ocard.sel::before{content:'';position:absolute;inset:0;border:2px solid var(--sandstone);
  background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none}
.ocheck{position:absolute;top:10px;right:10px;z-index:2;width:22px;height:22px;
  border-radius:50%;background:var(--earth-green);color:var(--cream);
  display:flex;align-items:center;justify-content:center;font-size:13px}
.oswatch{position:relative;width:100%;aspect-ratio:3/2;border-radius:8px;border:1px solid #4a4c43;margin-bottom:12px}
.oiswatch{position:relative;width:100%;aspect-ratio:16/9;border-radius:8px;border:1px solid #4a4c43;margin-bottom:12px}
.oname{position:relative;font-family:var(--fc);text-transform:uppercase;letter-spacing:.06em;font-size:18px;color:var(--cream)}
.onote{position:relative;font-size:12px;color:var(--sage)}
.extgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.intgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px}

/* Horizontal option cards */
.hcard{position:relative;background:var(--charcoal);border:1px solid var(--graphite);
  border-radius:12px;padding:18px;cursor:pointer;display:flex;gap:16px;align-items:flex-start}
.hcard.sel::before{content:'';position:absolute;inset:0;border:2px solid var(--sandstone);
  background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none}
.hthumb{position:relative;width:78px;height:78px;flex-shrink:0;border-radius:8px;
  border:1px solid #4a4c43;background:#fff center/cover no-repeat}
.hthumb-lg{position:relative;width:96px;height:96px;flex-shrink:0;border-radius:8px;
  border:1px solid #4a4c43;background:#fff center/contain no-repeat}
.hbody{position:relative;flex:1}
.hnrow{display:flex;justify-content:space-between;gap:12px;align-items:baseline}
.hname{font-family:var(--fc);text-transform:uppercase;letter-spacing:.04em;font-size:19px;color:var(--cream)}
.hprice{font-family:var(--fc);font-size:16px;color:var(--sandstone);white-space:nowrap}
.hprice-i{font-family:var(--fc);font-size:15px;color:var(--sage);white-space:nowrap}
.hdesc{font-size:13.5px;color:var(--dust);line-height:1.5;margin:6px 0 0}

/* Chip */
.chip{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:12px;
  padding:7px 13px;border-radius:5px;white-space:nowrap;position:relative;align-self:center}
.chip.on{background:var(--earth-green);color:var(--cream);border:1px solid var(--earth-green)}
.chip.off{background:transparent;color:var(--dust);border:1px solid var(--graphite)}

/* Pill */
.pill{font-family:var(--fc);text-transform:uppercase;letter-spacing:.06em;font-size:13px;
  padding:10px 14px;border-radius:6px;cursor:pointer;border:1px solid var(--graphite)}
.pill.on{background:rgba(169,137,93,.16);color:var(--cream);border-color:var(--sandstone)}
.pill.off{background:var(--charcoal);color:var(--dust)}
.pill.dis{background:#16170F;color:#5b5d53;cursor:not-allowed}

/* Rec banner */
.rec{display:flex;gap:12px;align-items:flex-start;background:rgba(214,181,109,.08);
  border:1px solid rgba(214,181,109,.4);border-radius:10px;padding:14px 16px;margin-top:16px}
.rec-icon{color:var(--amber);font-size:18px;line-height:1}
.rec-text{margin:0;font-size:13px;color:var(--amber);line-height:1.5}
.rec-strong{font-family:var(--fc);letter-spacing:.06em;text-transform:uppercase}
.powerrec{display:flex;align-items:center;gap:7px;margin-top:9px}
.powerrec-star{color:var(--amber);font-size:11px}
.powerrec-text{font-family:var(--fc);text-transform:uppercase;letter-spacing:.06em;font-size:12px;color:var(--amber)}

/* Nav buttons */
.navrow{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-top:6px}
.btn-back{background:transparent;color:var(--cream);border:1px solid var(--graphite);
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:16px;
  padding:13px 24px;border-radius:6px;cursor:pointer}
.btn-back:hover{background:rgba(255,255,255,.04)}
.btn-next{background:var(--sandstone);color:var(--carbon);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:16px;
  font-weight:600;padding:13px 34px;border-radius:6px;cursor:pointer;transition:background .15s}
.btn-next:hover{background:#927449}
.navmob{display:none;width:100%;order:3;justify-content:space-between;align-items:center;gap:14px}
.navmob .btn-next{flex:1}

/* Tow cards */
.towcard{position:relative;background:var(--charcoal);border:1px solid var(--graphite);
  border-radius:12px;padding:18px;cursor:pointer;display:flex;gap:16px;align-items:center}
.towcard.sel::before{content:'';position:absolute;inset:0;border:2px solid var(--sandstone);
  background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none}
.towbody{position:relative;flex:1}
.towname{font-family:var(--fc);text-transform:uppercase;letter-spacing:.04em;font-size:19px;color:var(--cream)}
.towdesc{font-size:13.5px;color:var(--dust);line-height:1.5;margin:6px 0 0}
.towprice{position:relative;font-family:var(--fc);font-size:15px;color:var(--sage)}

/* Review */
.review-wrap{position:relative;z-index:5;max-width:1080px;margin:0 auto;padding:44px 32px 96px}
.rev-layout{display:flex;flex-wrap:wrap;gap:28px;align-items:flex-start}
.rev-left{flex:1 1 380px;min-width:300px;display:flex;flex-direction:column;gap:14px}
.rev-right{flex:1 1 320px;min-width:280px;display:flex;flex-direction:column;gap:16px}
.revimg{border-radius:14px;overflow:hidden;border:1px solid var(--graphite);
  aspect-ratio:16/10;background:#131409 center/cover no-repeat}
.sumtable{background:var(--charcoal);border:1px solid var(--graphite);border-radius:12px;padding:8px 20px}
.sumrow{display:flex;justify-content:space-between;gap:16px;padding:12px 0;border-bottom:1px solid #2a2c24}
.sumrow:last-child{border-bottom:none}
.sumlabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--sage)}
.sumval{font-size:14px;color:var(--cream);text-align:right;font-weight:500}
.revprice{background:#16170F;border:1px solid var(--graphite);border-radius:12px;overflow:hidden}
.revphead{padding:18px 20px;border-bottom:1px solid var(--graphite);font-family:var(--fd);font-size:24px;letter-spacing:.04em;color:var(--cream)}
.revpbody{padding:8px 20px}
.revprow{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid #2a2c24}
.revprl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:14px;color:var(--dust)}
.revprv{font-family:var(--fc);font-size:18px;color:var(--cream)}
.revarow{display:flex;justify-content:space-between;gap:12px;padding:10px 0}
.revarl{font-size:13px;color:var(--dust);line-height:1.3}
.revarv{font-family:var(--fc);font-size:14px;color:var(--cream);white-space:nowrap}
.revsubtrow{display:flex;justify-content:space-between;padding:12px 0;border-top:1px solid #2a2c24;border-bottom:1px solid #2a2c24}
.revtotrow{display:flex;justify-content:space-between;align-items:baseline;padding:16px 0 14px}
.revtotlabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:15px;color:var(--cream)}
.revtotval{font-family:var(--fd);font-size:38px;color:var(--sandstone)}
.discbox{display:flex;gap:11px;align-items:flex-start;background:rgba(214,181,109,.07);
  border:1px solid rgba(214,181,109,.35);border-radius:10px;padding:14px 16px}
.discicon{color:var(--amber);font-size:16px;line-height:1.2}
.disctext{margin:0;font-size:12px;color:var(--dust);line-height:1.55}
.revbtns{display:flex;gap:12px}
.btn-save{flex:1;background:var(--sandstone);color:var(--carbon);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:16px;
  font-weight:600;padding:14px 22px;border-radius:6px;cursor:pointer;transition:background .15s}
.btn-save:hover{background:#927449}

/* Save / form */
.save-wrap{position:relative;z-index:5;max-width:920px;margin:0 auto;padding:44px 32px 96px}
.save-layout{display:flex;flex-wrap:wrap;gap:28px;align-items:flex-start}
.save-left{flex:1 1 380px;min-width:300px;display:flex;flex-direction:column;gap:14px}
.save-right{flex:1 1 300px;min-width:280px;display:flex;flex-direction:column;gap:14px}
.frow{display:flex;gap:14px;flex-wrap:wrap}
.ff{flex:1 1 150px;display:flex;flex-direction:column;gap:6px}
.ff.full{flex:1 1 100%}
.flabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.1em;font-size:12px;color:var(--sage)}
.finput{background:var(--charcoal);border:1px solid var(--graphite);border-radius:7px;
  padding:12px 13px;color:var(--cream);font-size:15px;outline:none;width:100%}
.finput:focus{border-color:var(--sandstone)}
.buildcard{background:#16170F;border:1px solid var(--graphite);border-radius:12px;padding:18px 20px}
.buildtitle{font-family:var(--fd);font-size:22px;letter-spacing:.04em;color:var(--cream);margin-bottom:12px}
.brow{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #2a2c24}
.brow:last-child{border-bottom:none}
.brl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.06em;font-size:12px;color:var(--sage)}
.brv{font-size:13px;color:var(--cream);text-align:right}
.bestrow{display:flex;justify-content:space-between;align-items:baseline;padding:14px 0 4px}
.bestlabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--cream)}
.bestval{font-family:var(--fd);font-size:30px;color:var(--sandstone)}
.btn-primary{background:var(--sandstone);color:var(--carbon);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:16px;
  font-weight:600;padding:15px 20px;border-radius:6px;cursor:pointer;transition:background .15s;width:100%}
.btn-primary:hover{background:#927449}
.btn-green{background:var(--earth-green);color:var(--cream);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:16px;
  padding:15px 20px;border-radius:6px;cursor:pointer;width:100%}
.btn-outline{background:transparent;color:var(--cream);border:1px solid var(--dust);
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:16px;
  padding:15px 20px;border-radius:6px;cursor:pointer;width:100%}
.btn-ghost{background:transparent;color:var(--sage);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:14px;
  padding:4px;cursor:pointer}

/* Intro */
.intro-wrap{position:relative;z-index:5;max-width:1200px;margin:0 auto;padding:64px 32px 80px}
.intro-layout{display:flex;flex-wrap:wrap;gap:48px;align-items:center}
.intro-left{flex:1 1 420px;min-width:320px}
.intro-right{flex:1 1 420px;min-width:320px}
.intro-ey{font-family:var(--fc);text-transform:uppercase;letter-spacing:.22em;font-size:14px;color:var(--sandstone);margin-bottom:18px}
.intro-title{font-family:var(--fd);font-size:84px;line-height:.9;letter-spacing:.02em;margin:0 0 24px}
.intro-copy{font-size:17px;line-height:1.65;color:var(--dust);max-width:540px;margin:0 0 32px}
.intro-cta{display:flex;flex-wrap:wrap;align-items:center;gap:24px}
.btn-start{background:var(--sandstone);color:var(--carbon);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:19px;
  font-weight:600;padding:16px 40px;border-radius:6px;cursor:pointer;transition:background .15s}
.btn-start:hover{background:#927449}
.msrp-lbl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:var(--sage);margin-bottom:4px}
.msrp-val{font-family:var(--fd);font-size:34px;color:var(--cream)}
.intro-hero{position:relative;border-radius:16px;overflow:hidden;border:1px solid var(--graphite);
  background:radial-gradient(120% 90% at 50% 18%,#2a2c26 0%,#131409 72%);aspect-ratio:4/3}

/* Success */
.success-wrap{text-align:center;padding:40px 0;max-width:560px;margin:0 auto}
.sicon{width:72px;height:72px;border-radius:50%;background:var(--earth-green);
  display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:34px;color:var(--cream)}
.stitle2{font-family:var(--fd);font-size:48px;letter-spacing:.03em;line-height:.95;margin:0 0 14px}
.sbody{font-size:16px;color:var(--dust);line-height:1.6;margin:0 0 8px}
.snote{font-size:14px;color:var(--sage);line-height:1.6;margin:0 0 30px}
.spricebox{display:inline-flex;align-items:baseline;gap:14px;background:#16170F;
  border:1px solid var(--graphite);border-radius:10px;padding:16px 26px;margin-bottom:30px}
.spricelab{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:14px;color:var(--dust)}
.spriceval{font-family:var(--fd);font-size:34px;color:var(--sandstone)}

/* Mobile bar */
#mobbar{position:fixed;left:0;right:0;bottom:0;z-index:70;display:none;
  align-items:center;justify-content:space-between;gap:14px;padding:14px 20px;
  background:rgba(14,15,12,.95);backdrop-filter:blur(10px);border-top:1px solid var(--graphite)}
.mblabel{font-family:var(--fc);text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--dust)}
.mbval{font-family:var(--fd);font-size:26px;color:var(--sandstone)}
.btn-det{background:var(--graphite);color:var(--cream);border:none;
  font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:13px;
  padding:10px 16px;border-radius:6px;cursor:pointer}
#drawer{position:fixed;inset:0;z-index:65;background:rgba(0,0,0,.5);
  display:none;align-items:flex-end}
#drawer.open{display:flex}
.drinner{width:100%;background:var(--charcoal);border-top:1px solid var(--graphite);
  border-radius:14px 14px 0 0;padding:22px;margin-bottom:72px}
.drrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--graphite)}
.drarow{display:flex;justify-content:space-between;gap:12px;padding:8px 0}
.drtot{display:flex;justify-content:space-between;padding:12px 0 4px;border-top:1px solid var(--graphite)}
.drlbl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:13px;color:var(--dust)}
.drval{font-family:var(--fc);color:var(--cream)}
.drtlbl{font-family:var(--fc);text-transform:uppercase;letter-spacing:.08em;font-size:14px;color:var(--cream)}
.drtval{font-family:var(--fd);font-size:26px;color:var(--sandstone)}
.footpad{height:76px}

/* Responsive */
@media(max-width:940px){
  #rail{position:static!important;order:2!important}
  #stepcol{order:1!important}
  .navrow.desk{display:none!important}
  .navmob{display:flex!important}
  #mobbar{display:flex!important}
  #hd-price{display:none!important}
  .rev-left{order:1}
  .rev-right{order:2}
}
@media(max-width:560px){
  #rail,#stepcol{flex-basis:100%!important;min-width:0!important}
  header{padding:14px 18px}
  #prog{padding:14px 18px}
  #config{padding:24px 18px 96px}
  .intro-wrap{padding:40px 18px 60px}
  .review-wrap,.save-wrap{padding:32px 18px 96px}
  .intro-title{font-size:60px}
  .stitle{font-size:36px}
  .extgrid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="topo"></div>
<div style="position:relative;min-height:100vh">

<header>
  <div class="hd-left">
    <img class="hd-logo" src="assets/brs-wordmark-white.png" alt="BRS Offroad">
    <div class="hd-div"></div>
    <span class="hd-tag">Sherpa Gen 3 Builder</span>
  </div>
  <div id="hd-price">
    <div class="hd-plabel">Estimated Build Price</div>
    <div class="hd-pval" id="hd-pval">$69,990</div>
  </div>
</header>

<div id="prog"></div>
<div id="content"></div>
<div class="footpad"></div>

<div id="mobbar">
  <div>
    <div class="mblabel">Estimated Build Price</div>
    <div class="mbval" id="mbval">$69,990</div>
  </div>
  <button class="btn-det" id="btn-det">View Build Price</button>
</div>

<div id="drawer" onclick="BRS.closeDrawer()">
  <div class="drinner" onclick="event.stopPropagation()" id="drinner"></div>
</div>

</div>

<script>
// ── DATA ────────────────────────────────────────────────────
const PRICES = {
  base: 69990,
  inverter: 950,
  secondBattery: 2390,
  heatedPerBattery: 375,
  airConditioner: 2735,
  inductionCooktop: 95, // update if BRS revises induction pricing
};
const EXTERIOR = [
  { id:'bronze', label:'Bronze', hex:'#7A5638' },
  { id:'silver', label:'Silver', hex:'#B9BCBC' },
  { id:'tan',    label:'Tan',    hex:'#C8B99A' },
  { id:'green',  label:'Green',  hex:'#5F6B4F' },
];
const EXT_IMGS = {
  tan:'assets/sherpa-tan.png', silver:'assets/sherpa-silver.png',
  bronze:'assets/sherpa-bronze.png', green:'assets/sherpa-green.png',
};
const INT_IMGS = {
  'dark-brown':'assets/interior-dark-brown.jpg',
  'tan':'assets/interior-tan.jpg',
};
const LEATHER = [
  { id:'dark-brown', label:'Dark Brown', hex:'#3B2A1D', tex:'assets/leather-dark-brown.png' },
  { id:'tan',        label:'Tan',        hex:'#B9986A', tex:'assets/leather-tan.png' },
];
const STEPS = ['intro','exterior','interior','comfort','kitchen','power','tow','review','save'];
const PSTEPS = [
  ['exterior','Exterior'],['interior','Interior'],['comfort','Comfort'],
  ['kitchen','Kitchen'],['power','Power'],['tow','Tow'],
  ['review','Review'],['save','Save'],
];

// ── STATE ───────────────────────────────────────────────────
let S = {
  step:'intro', ext:'tan', leather:'dark-brown',
  inverter:false, secondBattery:false, heated:0,
  ac:false, kitchen:'propane', trailer:'standard',
  drawer:false, submitted:null,
  form:{first:'',last:'',email:'',phone:'',zip:'',contact:'call',notes:''},
};
function set(u){ S = typeof u==='function' ? {...S,...u(S)} : {...S,...u}; render(); }

// ── HELPERS ─────────────────────────────────────────────────
function fmt(n){ return '$'+Math.round(n).toLocaleString('en-US'); }
function fmtc(n){ return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function ext(){ return EXTERIOR.find(o=>o.id===S.ext)||EXTERIOR[0]; }
function lea(){ return LEATHER.find(o=>o.id===S.leather)||LEATHER[0]; }
function heated(){ return Math.min(S.heated, S.secondBattery?2:1); }
function addOns(){
  const h=heated(), P=PRICES, ao=[];
  if(S.inverter) ao.push({label:'KISAE 3000W Pure Sine Inverter',price:P.inverter});
  if(S.secondBattery) ao.push({label:'Second 270Ah GC3 LiFePO4 Battery',price:P.secondBattery});
  if(h>0) ao.push({label:`Heated Battery Upgrade (${h})`,price:P.heatedPerBattery*h});
  if(S.ac) ao.push({label:'Dometic Air Conditioner',price:P.airConditioner});
  if(S.kitchen==='induction') ao.push({label:'SUMMIT Induction Cooktop',price:P.inductionCooktop});
  const total=ao.reduce((a,b)=>a+b.price,0);
  return {ao,total};
}
function previewSrc(){
  const e=ext();
  if(S.step==='interior') return INT_IMGS[S.leather];
  if(S.step==='kitchen') return 'assets/kitchen-galley.png';
  if(S.step==='comfort') return 'assets/comfort-cabin.png';
  if(S.step==='tow') return 'assets/tow-hitch.png';
  return EXT_IMGS[e.id];
}
function chipClass(on){ return 'chip '+(on?'on':'off'); }
function pillClass(on,dis){ return 'pill '+(dis?'dis':on?'on':'off'); }

function goTo(step){ S={...S,step,drawer:false}; render(); window.scrollTo(0,0); }

// ── BUILDERS ─────────────────────────────────────────────────
function rail(){
  const e=ext(), l=lea(), {ao,total}=addOns(), est=PRICES.base+total;
  const src=previewSrc();
  const wash=`radial-gradient(58% 46% at 50% 60%,${e.hex}66,transparent 72%)`;
  const esw=`background:${e.hex}`;
  const lsw=l.tex?`background:${l.hex} url('${l.tex}') center/cover no-repeat`:`background:${l.hex}`;
  const addHtml=ao.length?`<div class="pc-addons">${ao.map(a=>`
    <div class="pc-arow"><span class="pc-alabel">${esc(a.label)}</span>
    <span class="pc-aval">+${fmtc(a.price)}</span></div>`).join('')}</div>`:'';
  return `
<div id="rail">
  <div class="prev-box">
    <div class="prev-wash" style="background:${wash}"></div>
    ${src?`<div class="prev-img" style="background-image:url('${src}')"></div>`
    :`<div style="display:flex;align-items:center;justify-content:center;position:absolute;inset:0;z-index:2">
      <div class="prev-ph"><span>Live Preview</span></div></div>`}
  </div>
  <div class="glance">
    <div class="gc"><div class="gsw" style="${esw}"></div>
      <div><div class="gsl">Exterior</div><div class="gv">${e.label}</div></div></div>
    <div class="gc"><div class="gsw" style="${lsw}"></div>
      <div><div class="gsl">Interior</div><div class="gv">${l.label}</div></div></div>
  </div>
  <div class="pc">
    <div class="pc-top">
      <div class="pc-row"><span class="pclabel">Starting MSRP</span><span class="pcval">$69,990</span></div>
      <div class="pc-row"><span class="pclabel">Selected Add-Ons</span>
        <span class="pcval" style="color:var(--sandstone)">${total>0?'+'+fmt(total):'$0'}</span></div>
    </div>
    ${addHtml}
    <div class="pc-total"><span class="pc-tlabel">Estimated Build Price</span>
      <span class="pc-tval">${fmt(est)}</span></div>
  </div>
  <p class="pc-disc">Estimated build price is based on starting MSRP and selected add-ons. Final pricing, availability, taxes, freight, dealer fees, installation, regional pricing, and configuration details may vary. A BRS Offroad representative or authorized dealer will confirm the final build price.</p>
</div>`;
}

function nav(prevStep,nextStep,nextLabel){
  return `
  <div class="navrow desk">
    <button class="btn-back" onclick="goTo('${prevStep}')">Back</button>
    <button class="btn-next" onclick="goTo('${nextStep}')">${nextLabel}</button>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prevStep}')">Back</button>
    <button class="btn-next" onclick="goTo('${nextStep}')">${nextLabel}</button>
  </div>`;
}

function stepNav(){
  const idx=STEPS.indexOf(S.step);
  const nxt=STEPS[idx+1]||'save';
  const prv=STEPS[idx-1]||'intro';
  const lbl=S.step==='tow'?'Review Build':'Continue';
  return {prv,nxt,lbl};
}

function exterior(){
  const opts=EXTERIOR.map(o=>{
    const sel=o.id===S.ext;
    const sw=o.id==='silver'?'background:#cccccc'
      :`background:linear-gradient(135deg,${o.hex} 0%,${o.hex}cc 60%,${o.hex}88 100%)`;
    return `<div class="ocard${sel?' sel':''}" onclick="BRS.setExt('${o.id}')">
      ${sel?'<div class="ocheck">✓</div>':''}
      <div class="oswatch" style="${sw}"></div>
      <div class="oname">${o.label}</div>
      <div class="onote">Included</div>
    </div>`;
  }).join('');
  const {prv,nxt,lbl}=stepNav();
  return `
<div id="config">${rail()}
  <div id="stepcol">
    <div class="anim">
      <div class="seyebrow">Step 01 · Finish</div>
      <h2 class="stitle">Choose Your Exterior Finish</h2>
      <p class="sdesc">All exterior color options are included at no additional cost.</p>
      <div class="extgrid">${opts}</div>
    </div>
    <div class="navrow desk">
      <button class="btn-back" onclick="goTo('${prv}')">Back</button>
      <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
    </div>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prv}')">Back</button>
    <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
  </div>
</div>`;
}

function interior(){
  const opts=LEATHER.map(o=>{
    const sel=o.id===S.leather;
    const sw=o.tex?`background:${o.hex} url('${o.tex}') center/cover no-repeat`:`background:${o.hex}`;
    return `<div class="ocard${sel?' sel':''}" onclick="BRS.setLeather('${o.id}')">
      ${sel?'<div class="ocheck">✓</div>':''}
      <div class="oiswatch" style="${sw}"></div>
      <div class="oname">${o.label} Leather</div>
      <div class="onote">Included</div>
    </div>`;
  }).join('');
  const {prv,nxt,lbl}=stepNav();
  return `
<div id="config">${rail()}
  <div id="stepcol">
    <div class="anim">
      <div class="seyebrow">Step 02 · Cabin</div>
      <h2 class="stitle">Choose Your Interior Leather</h2>
      <p class="sdesc">All leather color options are included at no additional cost.</p>
      <div class="intgrid">${opts}</div>
    </div>
    <div class="navrow desk">
      <button class="btn-back" onclick="goTo('${prv}')">Back</button>
      <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
    </div>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prv}')">Back</button>
    <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
  </div>
</div>`;
}

function comfort(){
  const sel=S.ac;
  const {prv,nxt,lbl}=stepNav();
  return `
<div id="config">${rail()}
  <div id="stepcol">
    <div class="anim">
      <div class="seyebrow">Step 03 · Climate</div>
      <h2 class="stitle">Comfort &amp; Climate</h2>
      <p class="sdesc">Add comfort-focused upgrades to make your Sherpa more capable across different climates and travel conditions.</p>
      <div class="hcard${sel?' sel':''}" onclick="BRS.toggleAC()">
        ${sel?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
        <div class="hthumb-lg" style="background-image:url('assets/dometic-ac.webp')"></div>
        <div class="hbody">
          <div class="hnrow"><span class="hname">Dometic Air Conditioner</span><span class="hprice">+$2,735.00</span></div>
          <p class="hdesc">Stay comfortable in warmer climates with added air conditioning designed to help keep the cabin cool when temperatures rise.</p>
        </div>
        <div class="${chipClass(sel)}" onclick="event.stopPropagation();BRS.toggleAC()">${sel?'Added':'Add'}</div>
      </div>
      ${sel?`<div class="rec"><span class="rec-icon">⚠</span>
        <p class="rec-text"><strong class="rec-strong">Recommended:</strong> For heavier electrical use, BRS recommends pairing this upgrade with additional battery or inverter capacity.</p></div>`:''}
    </div>
    <div class="navrow desk">
      <button class="btn-back" onclick="goTo('${prv}')">Back</button>
      <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
    </div>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prv}')">Back</button>
    <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
  </div>
</div>`;
}

function kitchen(){
  const prop=S.kitchen==='propane', ind=S.kitchen==='induction';
  const {prv,nxt,lbl}=stepNav();
  return `
<div id="config">${rail()}
  <div id="stepcol">
    <div class="anim">
      <div class="seyebrow">Step 04 · Galley</div>
      <h2 class="stitle">Choose Your Kitchen Setup</h2>
      <p class="sdesc">Choose the cooking setup that best fits the way you camp. Only one kitchen setup can be selected.</p>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="hcard${prop?' sel':''}" onclick="BRS.setKitchen('propane')">
          ${prop?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
          <div class="hthumb" style="background-image:url('assets/propane-cooktop.jpg')"></div>
          <div class="hbody">
            <div class="hnrow"><span class="hname">Standard 2-Burner Propane Cooktop</span><span class="hprice-i">Included</span></div>
            <p class="hdesc">Included with the Sherpa Gen 3.</p>
          </div>
          <div class="${chipClass(prop)}">${prop?'Selected':'Select'}</div>
        </div>
        <div class="hcard${ind?' sel':''}" onclick="BRS.setKitchen('induction')">
          ${ind?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
          <div class="hthumb" style="background-image:url('assets/induction-cooktop.webp')"></div>
          <div class="hbody">
            <div class="hnrow"><span class="hname">SUMMIT 12" 2-Zone Induction Cooktop</span><span class="hprice">+$95.00</span></div>
            <p class="hdesc">Upgrade from the standard 2-burner propane cooktop to a clean electric induction cooking setup with two cooking zones. This replaces the standard propane cooktop.</p>
          </div>
          <div class="${chipClass(ind)}">${ind?'Selected':'Select'}</div>
        </div>
      </div>
      ${ind?`<div class="rec"><span class="rec-icon">⚠</span>
        <p class="rec-text"><strong class="rec-strong">Recommended:</strong> For heavier electrical use, BRS recommends pairing this upgrade with additional battery or inverter capacity.</p></div>`:''}
    </div>
    <div class="navrow desk">
      <button class="btn-back" onclick="goTo('${prv}')">Back</button>
      <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
    </div>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prv}')">Back</button>
    <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
  </div>
</div>`;
}

function power(){
  const h=heated(), rec=S.ac||S.kitchen==='induction';
  const heavyPicks=[];
  if(S.ac) heavyPicks.push('Dometic Air Conditioner');
  if(S.kitchen==='induction') heavyPicks.push('induction cooktop');
  const recTxt=heavyPicks.length?'Recommended if you selected the '+heavyPicks.join(' and '):'';
  const prn=heavyPicks.length?`<div class="powerrec"><span class="powerrec-star">★</span><span class="powerrec-text">${recTxt}</span></div>`:'';
  const {prv,nxt,lbl}=stepNav();
  return `
<div id="config">${rail()}
  <div id="stepcol">
    <div class="anim">
      <div class="seyebrow">Step 05 · Off-Grid Power</div>
      <h2 class="stitle">Set Up Your Off-Grid Power</h2>
      <p class="sdesc">Customize your Sherpa's power system for longer trips, larger electrical loads, and more flexibility off the grid.</p>
      <div style="display:flex;flex-direction:column;gap:14px">

        <div class="hcard${S.inverter?' sel':''}" onclick="BRS.toggleInverter()">
          ${S.inverter?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
          <div class="hthumb" style="background-image:url('assets/kisae-inverter.webp')"></div>
          <div class="hbody">
            <div class="hnrow"><span class="hname">KISAE 3000W Pure Sine Inverter</span><span class="hprice">+$950.00</span></div>
            <p class="hdesc">Add more off-grid power flexibility with a 3000W pure sine inverter designed to support larger electrical loads and everyday camping essentials.</p>
            ${prn}
          </div>
          <div class="${chipClass(S.inverter)}" onclick="event.stopPropagation();BRS.toggleInverter()">${S.inverter?'Added':'Add'}</div>
        </div>

        <div class="hcard${S.secondBattery?' sel':''}" onclick="BRS.toggleSecondBattery()">
          ${S.secondBattery?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
          <div class="hthumb" style="background-image:url('assets/battleborn-battery.webp')"></div>
          <div class="hbody">
            <div class="hnrow"><span class="hname">Second 270Ah GC3 LiFePO4 Battery</span><span class="hprice">+$2,390.00</span></div>
            <p class="hdesc">Increase your onboard power capacity for longer off-grid stays, extended appliance use, and more time away from hookups.</p>
            ${prn}
          </div>
          <div class="${chipClass(S.secondBattery)}" onclick="event.stopPropagation();BRS.toggleSecondBattery()">${S.secondBattery?'Added':'Add'}</div>
        </div>

        <div class="hcard" style="cursor:default">
          <div class="hthumb" style="background-image:url('assets/heated-battery.jpeg')"></div>
          <div class="hbody">
            <div class="hnrow"><span class="hname">Heated Battery Upgrade</span><span class="hprice">+$375.00 / battery</span></div>
            <p class="hdesc">Upgrade your 270Ah GC3 Smart LiFePO4 battery for improved cold-weather performance — ideal for colder climates or trips where battery temperature management matters.</p>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:14px">
              <div class="${pillClass(h===0,false)}" onclick="BRS.setHeated(0)">No Upgrade</div>
              <div class="${pillClass(h===1,false)}" onclick="BRS.setHeated(1)">Upgrade 1 Battery · +$375</div>
              <div class="${pillClass(h===2,!S.secondBattery)}" onclick="BRS.setHeated(2)">Upgrade 2 Batteries · +$750</div>
            </div>
            ${!S.secondBattery?'<p style="font-size:12px;color:var(--sage);margin-top:10px">Add the second 270Ah battery above to enable the two-battery heated upgrade.</p>':''}
          </div>
        </div>
      </div>
      ${rec?`<div class="rec"><span class="rec-icon">⚠</span>
        <p class="rec-text"><strong class="rec-strong">Recommended:</strong> For heavier electrical use, BRS recommends pairing this upgrade with additional battery or inverter capacity.</p></div>`:''}
    </div>
    <div class="navrow desk">
      <button class="btn-back" onclick="goTo('${prv}')">Back</button>
      <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
    </div>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prv}')">Back</button>
    <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
  </div>
</div>`;
}

function tow(){
  const std=S.trailer==='standard', oth=S.trailer==='other';
  const {prv,nxt,lbl}=stepNav();
  return `
<div id="config">${rail()}
  <div id="stepcol">
    <div class="anim">
      <div class="seyebrow">Step 06 · Tow Setup</div>
      <h2 class="stitle">Confirm Your Tow Setup</h2>
      <p class="sdesc">The Sherpa Gen 3 comes standard with a U.S. 7-Way Round RV Trailer Connection. If your tow vehicle requires a different setup, BRS can outfit your camper with the appropriate connection.</p>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="towcard${std?' sel':''}" onclick="BRS.setTrailer('standard')">
          ${std?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
          <div class="towbody">
            <div class="towname">Standard U.S. 7-Way Round RV Connection</div>
            <p class="towdesc">The standard configuration for the Sherpa Gen 3.</p>
          </div>
          <span class="towprice">No additional cost</span>
        </div>
        <div class="towcard${oth?' sel':''}" onclick="BRS.setTrailer('other')">
          ${oth?'<div style="position:absolute;inset:0;border:2px solid #A9895D;background:rgba(169,137,93,.12);border-radius:12px;pointer-events:none"></div>':''}
          <div class="towbody">
            <div class="towname">Other / I Need Help Confirming</div>
            <p class="towdesc">A BRS specialist will confirm the right trailer connection for your tow vehicle.</p>
          </div>
          <span class="towprice">No additional cost</span>
        </div>
      </div>
    </div>
    <div class="navrow desk">
      <button class="btn-back" onclick="goTo('${prv}')">Back</button>
      <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
    </div>
  </div>
  <div class="navmob">
    <button class="btn-back" onclick="goTo('${prv}')">Back</button>
    <button class="btn-next" onclick="goTo('${nxt}')">${lbl}</button>
  </div>
</div>`;
}

function review(){
  const e=ext(), l=lea(), h=heated(), {ao,total}=addOns(), est=PRICES.base+total;
  const pp=[];
  if(S.inverter) pp.push('3000W Inverter');
  if(S.secondBattery) pp.push('Second 270Ah Battery');
  if(h>0) pp.push(`Heated Upgrade (${h})`);
  const rows=[
    {label:'Exterior',value:e.label},
    {label:'Interior',value:l.label+' Leather'},
    {label:'Power',value:pp.join(' + ')||'Standard power system'},
    {label:'Climate',value:S.ac?'Dometic Air Conditioner':'No climate add-on'},
    {label:'Kitchen',value:S.kitchen==='induction'?'SUMMIT Induction Cooktop':'Standard 2-Burner Propane'},
    {label:'Tow Setup',value:S.trailer==='standard'?'Standard 7-Way Round RV':'Other / Needs confirmation'},
  ];
  const extUrl=EXT_IMGS[e.id]?`url('${EXT_IMGS[e.id]}')`:'none';
  const intUrl=INT_IMGS[S.leather]?`url('${INT_IMGS[S.leather]}')`:'none';
  return `
<section class="review-wrap anim">
  <div class="seyebrow">Step 07 · Confirm</div>
  <h2 style="font-family:var(--fd);font-size:56px;letter-spacing:.03em;line-height:.95;margin:0 0 28px">Review Your Build</h2>
  <div class="rev-layout">
    <div class="rev-left">
      <div class="revimg" style="background-image:${extUrl}"></div>
      <div class="revimg" style="background-image:${intUrl}"></div>
      <div class="sumtable">
        ${rows.map(r=>`<div class="sumrow"><span class="sumlabel">${r.label}</span><span class="sumval">${esc(r.value)}</span></div>`).join('')}
      </div>
    </div>
    <div class="rev-right">
      <div class="revprice">
        <div class="revphead">Pricing</div>
        <div class="revpbody">
          <div class="revprow"><span class="revprl">Starting MSRP</span><span class="revprv">$69,990</span></div>
          ${ao.map(a=>`<div class="revarow"><span class="revarl">${esc(a.label)}</span><span class="revarv">+${fmtc(a.price)}</span></div>`).join('')}
          <div class="revsubtrow">
            <span class="revprl">Selected Add-Ons Total</span>
            <span style="font-family:var(--fc);font-size:18px;color:var(--sandstone)">${total>0?'+'+fmt(total):'$0'}</span>
          </div>
          <div class="revtotrow">
            <span class="revtotlabel">Estimated Build Price</span>
            <span class="revtotval">${fmt(est)}</span>
          </div>
        </div>
      </div>
      <div class="discbox">
        <span class="discicon">ⓘ</span>
        <p class="disctext">Estimated build price is based on starting MSRP and selected add-ons. Final pricing, availability, taxes, freight, dealer fees, installation, regional pricing, and configuration details may vary. A BRS Offroad representative or authorized dealer will confirm the final build price.</p>
      </div>
      <div class="revbtns">
        <button class="btn-back" onclick="goTo('tow')">Back</button>
        <button class="btn-save" onclick="goTo('save')">Save My Build</button>
      </div>
    </div>
  </div>
</section>`;
}

function save(){
  const {ao,total}=addOns(), est=PRICES.base+total;
  const e=ext(), l=lea(), h=heated();
  if(S.submitted){
    const msgs={
      email:{title:'Build Saved',body:'Thanks! Your Sherpa Gen 3 build sheet is on its way to your inbox and our team has your details.'},
      specialist:{title:"We'll Be In Touch",body:'A BRS Offroad Sherpa specialist will reach out shortly to walk through your build.'},
      dealer:{title:'Dealer Notified',body:'Your closest BRS Offroad dealer will contact you using your preferred contact method.'},
    };
    const m=msgs[S.submitted]||msgs.email;
    return `<section class="save-wrap anim">
      <div class="success-wrap">
        <div class="sicon">✓</div>
        <h2 class="stitle2">${m.title}</h2>
        <p class="sbody">${m.body}</p>
        <p class="snote">Your build sheet will be emailed to you after submission.</p>
        <div><div class="spricebox">
          <span class="spricelab">Estimated Build Price</span>
          <span class="spriceval">${fmt(est)}</span>
        </div></div>
        <div style="margin-top:16px"><button class="btn-outline" style="width:auto;padding:13px 28px" onclick="BRS.restart()">Start a New Build</button></div>
      </div>
    </section>`;
  }
  const pp=[];
  if(S.inverter) pp.push('3000W Inverter');
  if(S.secondBattery) pp.push('Second Battery');
  if(h>0) pp.push(`Heated (${h})`);
  const srows=[
    {label:'Exterior',value:e.label},
    {label:'Interior',value:l.label},
    {label:'Power',value:pp.join(' + ')||'Standard'},
    {label:'Kitchen',value:S.kitchen==='induction'?'Induction':'Propane'},
  ];
  const f=S.form;
  const cpills=['call','text','email'].map(c=>{
    const lbl=c==='call'?'Call Me':c==='text'?'Text Me':'Email Me';
    return `<div class="${pillClass(f.contact===c,false)}" onclick="BRS.setContact('${c}')">${lbl}</div>`;
  }).join('');
  return `
<section class="save-wrap anim">
  <div class="seyebrow">Step 08 · Next Step</div>
  <h2 style="font-family:var(--fd);font-size:56px;letter-spacing:.03em;line-height:.95;margin:0 0 10px">Save Your Sherpa Gen 3 Build</h2>
  <p style="font-size:16px;color:var(--dust);max-width:620px;margin:0 0 30px">Save your build and a member of the BRS Offroad team or your closest dealer will help you take the next step.</p>
  <div class="save-layout">
    <div class="save-left">
      <div class="frow">
        <div class="ff"><label class="flabel">First Name</label>
          <input class="finput" value="${esc(f.first)}" oninput="BRS.ff('first',this.value)"></div>
        <div class="ff"><label class="flabel">Last Name</label>
          <input class="finput" value="${esc(f.last)}" oninput="BRS.ff('last',this.value)"></div>
      </div>
      <div class="ff full"><label class="flabel">Email</label>
        <input class="finput" type="email" value="${esc(f.email)}" oninput="BRS.ff('email',this.value)"></div>
      <div class="frow">
        <div class="ff"><label class="flabel">Phone Number</label>
          <input class="finput" type="tel" value="${esc(f.phone)}" oninput="BRS.ff('phone',this.value)"></div>
        <div class="ff"><label class="flabel">ZIP Code</label>
          <input class="finput" value="${esc(f.zip)}" oninput="BRS.ff('zip',this.value)"></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <label class="flabel">Preferred Contact Method</label>
        <div style="display:flex;gap:10px;flex-wrap:wrap">${cpills}</div>
      </div>
      <div class="ff full"><label class="flabel">Notes / Questions</label>
        <textarea class="finput" rows="3" oninput="BRS.ff('notes',this.value)">${esc(f.notes)}</textarea></div>
    </div>
    <div class="save-right">
      <div class="buildcard">
        <div class="buildtitle">Your Build</div>
        ${srows.map(r=>`<div class="brow"><span class="brl">${r.label}</span><span class="brv">${esc(r.value)}</span></div>`).join('')}
        <div class="bestrow"><span class="bestlabel">Est. Build Price</span><span class="bestval">${fmt(est)}</span></div>
      </div>
      <button class="btn-primary" onclick="BRS.submit('email')">Save &amp; Email My Build Sheet</button>
      <button class="btn-green" onclick="BRS.submit('specialist')">Talk With a Sherpa Specialist</button>
      <button class="btn-outline" onclick="BRS.submit('dealer')">Call My Closest Dealer</button>
      <button class="btn-ghost" onclick="goTo('review')">← Back to review</button>
    </div>
  </div>
</section>`;
}

function intro(){
  return `
<div class="intro-wrap">
  <div class="intro-layout">
    <div class="intro-left anim">
      <div class="intro-ey">ADVENTURE AWAITS</div>
      <h1 class="intro-title">Build Your<br>Sherpa Gen 3</h1>
      <p class="intro-copy">Design your Sherpa Gen 3 around the way you travel. Choose your exterior finish, interior leather, power setup, comfort upgrades, kitchen configuration, and additional features. As you build, you'll review your selected options, see your estimated build price, and save your build so the BRS Offroad team or your closest dealer can help you take the next step.</p>
      <div class="intro-cta">
        <button class="btn-start" onclick="goTo('exterior')">Start Building</button>
        <div><div class="msrp-lbl">Starting MSRP</div><div class="msrp-val">$69,990</div></div>
      </div>
    </div>
    <div class="intro-right anim">
      <div class="intro-hero">
        <div style="position:absolute;inset:0;background:url('4-mqvc4jau.jpg') center/cover no-repeat"></div>
      </div>
    </div>
  </div>
</div>`;
}

function progress(){
  const cur=STEPS.indexOf(S.step);
  return PSTEPS.map(([id,label],i)=>{
    const sidx=STEPS.indexOf(id);
    const on=id===S.step, done=sidx<cur&&sidx>0;
    const sep=i<PSTEPS.length-1?'<div class="ps"></div>':'';
    return `<div class="pi" onclick="goTo('${id}')">
      <div class="pd ${on?'on':done?'done':''}">${String(i+1).padStart(2,'0')}</div>
      <span class="pl ${on?'on':done?'done':''}">${label}</span>
    </div>${sep}`;
  }).join('');
}

function drawer(){
  const {ao,total}=addOns(), est=PRICES.base+total;
  return `
<div class="drrow"><span class="drlbl">Starting MSRP</span><span class="drval">$69,990</span></div>
${ao.map(a=>`<div class="drarow"><span style="font-size:13px;color:var(--dust)">${esc(a.label)}</span><span class="drval">+${fmtc(a.price)}</span></div>`).join('')}
<div class="drtot"><span class="drtlbl">Estimated Build Price</span><span class="drtval">${fmt(est)}</span></div>`;
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  const building=S.step!=='intro';
  const {total}=addOns(), est=PRICES.base+total;

  // Header price
  const hp=document.getElementById('hd-price');
  if(hp) hp.style.display=building?'block':'none';
  const hv=document.getElementById('hd-pval');
  if(hv) hv.textContent=fmt(est);

  // Progress
  const pg=document.getElementById('prog');
  if(pg){ pg.style.display=building?'flex':'none'; if(building) pg.innerHTML=progress(); }

  // Content
  const ct=document.getElementById('content');
  if(!ct) return;
  const step=S.step;
  if(step==='intro') ct.innerHTML=intro();
  else if(step==='exterior') ct.innerHTML=exterior();
  else if(step==='interior') ct.innerHTML=interior();
  else if(step==='comfort') ct.innerHTML=comfort();
  else if(step==='kitchen') ct.innerHTML=kitchen();
  else if(step==='power') ct.innerHTML=power();
  else if(step==='tow') ct.innerHTML=tow();
  else if(step==='review') ct.innerHTML=review();
  else if(step==='save') ct.innerHTML=save();

  // Mobile bar
  const mb=document.getElementById('mobbar');
  if(mb) mb.style.display=building?'flex':'none';
  const mv=document.getElementById('mbval');
  if(mv) mv.textContent=fmt(est);
  const bd=document.getElementById('btn-det');
  if(bd) bd.textContent=S.drawer?'Hide':'View Build Price';

  // Drawer
  const dr=document.getElementById('drawer');
  if(dr) dr.classList.toggle('open',S.drawer);
  const di=document.getElementById('drinner');
  if(di) di.innerHTML=drawer();
}

// ── ACTIONS ──────────────────────────────────────────────────
function goTo(step){ S={...S,step,drawer:false}; render(); window.scrollTo(0,0); }

window.BRS={
  setExt(id){ set({ext:id}); },
  setLeather(id){ set({leather:id}); },
  toggleAC(){ set(s=>({ac:!s.ac})); },
  setKitchen(k){ set({kitchen:k}); },
  toggleInverter(){ set(s=>({inverter:!s.inverter})); },
  toggleSecondBattery(){
    set(s=>({secondBattery:!s.secondBattery,heated:!s.secondBattery?s.heated:Math.min(s.heated,1)}));
  },
  setHeated(n){
    if(n===2&&!S.secondBattery) return;
    set({heated:n});
  },
  setTrailer(t){ set({trailer:t}); },
  setContact(c){ set(s=>({form:{...s.form,contact:c}})); },
  ff(key,val){
    S={...S,form:{...S.form,[key]:val}};
    const {total}=addOns(), est=PRICES.base+total;
    const hv=document.getElementById('hd-pval'); if(hv) hv.textContent=fmt(est);
    const mv=document.getElementById('mbval'); if(mv) mv.textContent=fmt(est);
  },
  submit(kind){ set({submitted:kind}); window.scrollTo(0,0); },
  restart(){ S={...S,step:'intro',submitted:null}; render(); window.scrollTo(0,0); },
  closeDrawer(){ set({drawer:false}); },
};

document.getElementById('btn-det').addEventListener('click',()=>set(s=>({drawer:!s.drawer})));

render();
</script>
</body>
</html>
